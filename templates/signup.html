<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YIN Trading Platform — Create Account</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --navy: #1a2366;
        --navy-dark: #111848;
        --sky: #2e9fd4;
        --red: #e63329;
        --white: #ffffff;
        --gray: #8898aa;
        --border: rgba(46, 159, 212, 0.2);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Barlow", sans-serif;
        background: var(--navy-dark);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        z-index: 0;
        background-image:
          linear-gradient(rgba(46, 159, 212, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(46, 159, 212, 0.06) 1px, transparent 1px);
        background-size: 40px 40px;
        animation: gridMove 20s linear infinite;
      }
      @keyframes gridMove {
        0% {
          transform: translate(0, 0);
        }
        100% {
          transform: translate(40px, 40px);
        }
      }
      .bg-orb1 {
        position: fixed;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(26, 35, 102, 0.4) 0%,
          transparent 70%
        );
        top: -200px;
        left: -200px;
        z-index: 0;
      }
      .bg-orb2 {
        position: fixed;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(46, 159, 212, 0.1) 0%,
          transparent 70%
        );
        bottom: -100px;
        right: -100px;
        z-index: 0;
        animation: pulse 7s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.15);
        }
      }

      .signup-wrapper {
        position: relative;
        z-index: 10;
        width: 480px;
        max-width: 95vw;
        background: #0d1433;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
        border: 1px solid var(--border);
      }

      .signup-header {
        background: linear-gradient(135deg, var(--navy) 0%, #1e2d7a 100%);
        padding: 32px 40px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 20px;
      }
      .signup-header img {
        height: 44px;
        filter: brightness(0) invert(1);
      }
      .signup-header-text h1 {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 22px;
        font-weight: 800;
        color: var(--white);
      }
      .signup-header-text p {
        font-size: 12px;
        color: var(--sky);
        margin-top: 2px;
      }

      .signup-body {
        padding: 36px 40px;
      }

      .form-title {
        margin-bottom: 28px;
      }
      .form-title h2 {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 28px;
        font-weight: 800;
        color: var(--white);
      }
      .form-title h2 span {
        color: var(--sky);
      }
      .form-title p {
        font-size: 12px;
        color: var(--gray);
        margin-top: 6px;
      }

      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--sky);
        margin-bottom: 8px;
      }
      .form-group input {
        width: 100%;
        padding: 13px 16px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(46, 159, 212, 0.2);
        border-radius: 10px;
        color: var(--white);
        font-family: "Barlow", sans-serif;
        font-size: 14px;
        transition: all 0.3s;
        outline: none;
      }
      .form-group input:focus {
        border-color: var(--sky);
        background: rgba(46, 159, 212, 0.08);
        box-shadow: 0 0 0 3px rgba(46, 159, 212, 0.1);
      }
      .form-group input::placeholder {
        color: rgba(255, 255, 255, 0.2);
      }

      .password-strength {
        display: flex;
        gap: 4px;
        margin-top: 8px;
      }
      .strength-bar {
        flex: 1;
        height: 3px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.1);
        transition: background 0.3s;
      }

      .btn-create {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, var(--sky) 0%, #1a7ab5 100%);
        border: none;
        border-radius: 10px;
        color: var(--white);
        font-family: "Barlow", sans-serif;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 8px;
      }
      .btn-create:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(46, 159, 212, 0.4);
      }

      .login-link {
        text-align: center;
        margin-top: 20px;
        font-size: 13px;
        color: var(--gray);
      }
      .login-link a {
        color: var(--sky);
        text-decoration: none;
        font-weight: 600;
      }
      .login-link a:hover {
        text-decoration: underline;
      }

      .perks {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 24px;
      }
      .perk {
        background: rgba(46, 159, 212, 0.06);
        border: 1px solid rgba(46, 159, 212, 0.15);
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 11px;
        color: var(--gray);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .perk span:first-child {
        font-size: 14px;
      }

      .error-msg {
        background: rgba(230, 51, 41, 0.1);
        border: 1px solid rgba(230, 51, 41, 0.3);
        border-left: 3px solid var(--red);
        border-radius: 8px;
        padding: 10px 14px;
        color: #ff8a85;
        font-size: 12px;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="bg-orb1"></div>
    <div class="bg-orb2"></div>

    <div class="signup-wrapper">
      <div class="signup-header">
        <img
          src="{{ url_for('static', filename='logo.png') }}"
          alt="YIN"
          onerror="this.style.display = 'none'"
        />
        <div class="signup-header-text">
          <h1>Young Investors Network</h1>
          <p>GSE Virtual Trading Platform</p>
        </div>
      </div>

      <div class="signup-body">
        <div class="form-title">
          <h2>Create Your <span>Account</span></h2>
          <p>Join the competition with GHS 1,000,000 in virtual capital</p>
        </div>

        <div class="perks">
          <div class="perk"><span>💰</span> GHS 1M Capital</div>
          <div class="perk"><span>📊</span> Live GSE Prices</div>
          <div class="perk"><span>🏆</span> Leaderboard</div>
          <div class="perk"><span>🔔</span> Price Alerts</div>
        </div>

        {% if error %}
        <div class="error-msg">⚠ {{ error }}</div>
        {% endif %}

        <form method="POST" action="/signup">
          <div class="form-group">
            <label>Username</label>
            <input
              type="text"
              name="username"
              placeholder="Choose a username"
              required
              autocomplete="username"
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              name="password"
              id="pwd"
              placeholder="Create a strong password"
              required
              autocomplete="new-password"
            />
            <div class="password-strength">
              <div class="strength-bar" id="s1"></div>
              <div class="strength-bar" id="s2"></div>
              <div class="strength-bar" id="s3"></div>
              <div class="strength-bar" id="s4"></div>
            </div>
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input
              type="password"
              name="confirm_password"
              placeholder="Repeat your password"
              required
              autocomplete="new-password"
            />
          </div>
          <button type="submit" class="btn-create">Create Account →</button>
        </form>

        <div class="login-link">
          Already have an account? <a href="/login">Sign in</a>
        </div>
      </div>
    </div>

    <script>
      const pwd = document.getElementById("pwd");
      const bars = [
        document.getElementById("s1"),
        document.getElementById("s2"),
        document.getElementById("s3"),
        document.getElementById("s4"),
      ];
      const colors = ["#e63329", "#f59e0b", "#2e9fd4", "#22c55e"];
      pwd.addEventListener("input", () => {
        const v = pwd.value;
        let score = 0;
        if (v.length >= 6) score++;
        if (v.length >= 10) score++;
        if (/[A-Z]/.test(v) && /[0-9]/.test(v)) score++;
        if (/[^A-Za-z0-9]/.test(v)) score++;
        bars.forEach((b, i) => {
          b.style.background =
            i < score ? colors[score - 1] : "rgba(255,255,255,0.1)";
        });
      });
    </script>
  </body>
</html>
